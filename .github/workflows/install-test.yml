name: Install Test

on:
  pull_request:
    paths:
      - "scripts/install.sh"
      - "scripts/install.ps1"
      - "scripts/uninstall.sh"
      - "scripts/uninstall.ps1"
      - ".github/workflows/install-test.yml"
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  # Build the binary ourselves and exercise the --from-source path end-to-
  # end on every supported OS, including the plugin install side-effect.
  # Uses a sandboxed FAKE_HOME so we never touch the runner's real user
  # profile (rustup / cargo home are preserved so the toolchain still
  # resolves).
  from_source:
    name: From-source install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - uses: Swatinem/rust-cache@v2.9.1

      - name: Install + plugin round-trip (bash)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          # Sandbox only HOME (the surface the installer touches); keep
          # rustup / cargo home pointing at the runner toolchain.
          export RUSTUP_HOME="${RUSTUP_HOME:-$HOME/.rustup}"
          export CARGO_HOME="${CARGO_HOME:-$HOME/.cargo}"
          FAKE_HOME="$(mktemp -d)"
          HOME="$FAKE_HOME" KNOTCH_YES=1 ./scripts/install.sh --from-source --plugin user --install-dir "$FAKE_HOME/bin"
          "$FAKE_HOME/bin/knotch" --version
          test -f "$FAKE_HOME/.claude/plugins/knotch/hooks/hooks.json" || { echo "plugin manifest missing"; exit 1; }
          test -d "$FAKE_HOME/.claude/plugins/knotch/skills" || { echo "plugin skills dir missing"; exit 1; }
          HOME="$FAKE_HOME" KNOTCH_YES=1 ./scripts/uninstall.sh --install-dir "$FAKE_HOME/bin"
          test ! -f "$FAKE_HOME/bin/knotch" || { echo "binary still present"; exit 1; }
          test ! -d "$FAKE_HOME/.claude/plugins/knotch" || { echo "plugin still present"; exit 1; }

      - name: Install + plugin round-trip (powershell)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $fake = Join-Path ([IO.Path]::GetTempPath()) ("knotch-test-" + [Guid]::NewGuid().ToString("N").Substring(0,8))
          New-Item -ItemType Directory -Force -Path $fake | Out-Null
          if (-not $env:RUSTUP_HOME) { $env:RUSTUP_HOME = Join-Path $env:USERPROFILE ".rustup" }
          if (-not $env:CARGO_HOME)  { $env:CARGO_HOME  = Join-Path $env:USERPROFILE ".cargo" }
          $env:USERPROFILE = $fake
          .\scripts\install.ps1 -FromSource -Plugin user -InstallDir (Join-Path $fake "bin") -Yes
          & (Join-Path $fake "bin\knotch.exe") --version
          if (-not (Test-Path (Join-Path $fake ".claude\plugins\knotch\hooks\hooks.json"))) { throw "plugin manifest missing" }
          if (-not (Test-Path (Join-Path $fake ".claude\plugins\knotch\skills"))) { throw "plugin skills dir missing" }
          .\scripts\uninstall.ps1 -InstallDir (Join-Path $fake "bin") -Yes
          if (Test-Path (Join-Path $fake "bin\knotch.exe")) { throw "binary still present" }
          if (Test-Path (Join-Path $fake ".claude\plugins\knotch")) { throw "plugin still present" }

  # Exercise the prebuilt-download path after a successful Release run.
  prebuilt:
    name: Prebuilt install (${{ matrix.os }})
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install (bash, prebuilt)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          FAKE_HOME="$(mktemp -d)"
          HOME="$FAKE_HOME" KNOTCH_YES=1 ./scripts/install.sh --plugin none --install-dir "$FAKE_HOME/bin"
          "$FAKE_HOME/bin/knotch" --version

      - name: Install (powershell, prebuilt)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $fake = Join-Path ([IO.Path]::GetTempPath()) ("knotch-test-" + [Guid]::NewGuid().ToString("N").Substring(0,8))
          New-Item -ItemType Directory -Force -Path $fake | Out-Null
          $env:USERPROFILE = $fake
          .\scripts\install.ps1 -Plugin none -InstallDir (Join-Path $fake "bin") -Yes
          & (Join-Path $fake "bin\knotch.exe") --version
