name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  fmt:
    # Uses the nightly rustfmt channel so `rustfmt.toml`'s unstable
    # keys (`group_imports`, `imports_granularity`, `wrap_comments`,
    # `normalize_comments`, `comment_width`, `format_strings`) apply
    # in CI. Everything else in the workspace stays on stable 1.94.0.
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt
          cache: false
      - run: cargo fmt --all --check

  clippy:
    name: clippy (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, beta]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
          cache: false
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]
        include:
          - os: ubuntu-latest
            toolchain: "1.94"   # MSRV
          - os: ubuntu-latest
            toolchain: beta
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          cache: false
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --all-features
      - run: cargo test --workspace --all-features --doc

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview
          cache: false
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info nextest
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          fail_ci_if_error: false

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - uses: EmbarkStudios/cargo-deny-action@v2

  knotch-linter:
    name: knotch-linter (R1/R2/R3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - uses: Swatinem/rust-cache@v2
      - name: install knotch-linter
        run: cargo install --path crates/knotch-linter --bin cargo-knotch-linter --locked
      - name: cargo knotch-linter
        run: cargo knotch-linter

  machete:
    name: cargo-machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - uses: bnjbvr/cargo-machete@main

  semver:
    # Crates are unreleased (no crates.io baseline yet). Diff the PR
    # against its base branch instead. Once the first release lands,
    # drop `baseline-rev` to fall back to the published baseline.
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - uses: Swatinem/rust-cache@v2
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          baseline-rev: ${{ github.event.pull_request.base.sha }}

  public-api:
    name: cargo-public-api (baseline diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
          cache: false
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api
      - name: Diff every published crate against its baseline
        run: |
          set -euo pipefail
          for crate in knotch-kernel knotch-proto knotch-derive knotch-storage \
                       knotch-lock knotch-vcs knotch-workflow knotch-schema \
                       knotch-observer knotch-reconciler knotch-query \
                       knotch-tracing knotch-testing knotch-linter \
                       knotch-agent knotch-frontmatter knotch-adr; do
            baseline="docs/public_api/${crate}.baseline"
            if [ ! -f "${baseline}" ]; then
              echo "::notice::no baseline for ${crate} — run the regeneration script"
              continue
            fi
            actual=$(mktemp)
            cargo public-api --manifest-path "crates/${crate}/Cargo.toml" \
                             --simplified > "${actual}"
            if ! diff -u "${baseline}" "${actual}"; then
              echo "::error::public-api drift in ${crate}"
              exit 1
            fi
          done

  # MSRV is verified by the `test (ubuntu-latest / 1.94)` matrix row
  # above — it runs the full workspace test suite against the pinned
  # minimum toolchain, which is a stricter gate than `cargo-msrv
  # verify` (cargo-build check only). A separate cargo-msrv job would
  # duplicate coverage while adding an extra CLI surface whose stable
  # flag set has churned between releases.

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
